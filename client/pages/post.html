<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post - GameHub</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-logo">
        <i class="fas fa-gamepad"></i>
        <span>GameHub</span>
      </a>
      
      <div class="nav-search">
        <input type="text" id="searchInput" placeholder="Search posts, users, tags...">
        <button id="searchBtn"><i class="fas fa-search"></i></button>
      </div>
      
      <div class="nav-links" id="navLinks">
        <a href="/" class="nav-link"><i class="fas fa-home"></i> Home</a>
        <a href="explore.html" class="nav-link"><i class="fas fa-compass"></i> Explore</a>
        <a href="notifications.html" class="nav-link" id="navNotifications">
          <i class="fas fa-bell"></i> Notifications
          <span class="badge" id="notificationBadge" style="display: none;">0</span>
        </a>
        <a href="profile.html" class="nav-link" id="navProfile"><i class="fas fa-user"></i> Profile</a>
      </div>
      
      <div class="nav-auth" id="navAuth">
        <a href="login.html" class="btn btn-outline">Login</a>
        <a href="register.html" class="btn btn-primary">Sign Up</a>
      </div>
      
      <div class="nav-user" id="navUser" style="display: none;">
        <div class="user-menu">
          <img src="" alt="Avatar" class="user-avatar" id="navAvatar">
          <span id="navUsername"></span>
          <i class="fas fa-chevron-down"></i>
          <div class="dropdown-menu">
            <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
            <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
            <hr>
            <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
          </div>
        </div>
      </div>
      
      <button class="nav-toggle" id="navToggle">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-container post-page">
    <div class="post-detail-container">
      <!-- Post Detail -->
      <article class="post-detail" id="postDetail">
        <div class="loading">Loading post...</div>
      </article>

      <!-- Comments Section -->
      <section class="comments-section" id="commentsSection" style="display: none;">
        <div class="comments-header">
          <h3><i class="fas fa-comments"></i> Comments <span id="commentsCount">(0)</span></h3>
          <div class="comments-sort">
            <select id="sortComments">
              <option value="newest">Newest</option>
              <option value="oldest">Oldest</option>
              <option value="popular">Most Popular</option>
            </select>
          </div>
        </div>
        
        <!-- Add Comment -->
        <div class="add-comment" id="addCommentSection">
          <img src="" alt="Avatar" class="user-avatar" id="commentAvatar">
          <div class="comment-input-wrapper">
            <textarea id="commentContent" placeholder="Write a comment..." rows="2"></textarea>
            <button class="btn btn-primary" id="submitComment">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
        
        <!-- Comments List -->
        <div class="comments-list" id="commentsList">
          <div class="loading">Loading comments...</div>
        </div>
        
        <div class="load-more" id="loadMoreComments" style="display: none;">
          <button class="btn btn-outline">Load More Comments</button>
        </div>
      </section>
    </div>

    <!-- Right Sidebar -->
    <aside class="sidebar sidebar-right">
      <div class="sidebar-section">
        <h3>Post Stats</h3>
        <div class="post-stats-detail">
          <div class="stat-row">
            <span><i class="fas fa-eye"></i> Views</span>
            <span id="postViews">0</span>
          </div>
          <div class="stat-row">
            <span><i class="fas fa-heart"></i> Likes</span>
            <span id="postLikes">0</span>
          </div>
          <div class="stat-row">
            <span><i class="fas fa-comment"></i> Comments</span>
            <span id="postComments">0</span>
          </div>
          <div class="stat-row">
            <span><i class="fas fa-clock"></i> Posted</span>
            <span id="postTime">-</span>
          </div>
        </div>
      </div>
      
      <div class="sidebar-section">
        <h3>More from <span id="authorName">Author</span></h3>
        <div class="mini-posts" id="authorPosts">
          <div class="loading">Loading...</div>
        </div>
      </div>
    </aside>
  </main>

  <!-- Edit Post Modal -->
  <div class="modal" id="editPostModal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Edit Post</h2>
        <button class="modal-close" id="closeEditModal"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <form id="editPostForm">
          <div class="form-group">
            <textarea id="editPostContent" rows="5" maxlength="2000"></textarea>
          </div>
          <div class="form-group">
            <label>Current Image</label>
            <div class="current-image" id="currentPostImage"></div>
            <label class="checkbox">
              <input type="checkbox" id="removePostImage">
              <span>Remove image</span>
            </label>
          </div>
          <div class="form-group">
            <label>Replace Image</label>
            <input type="file" id="editPostImage" accept="image/*">
          </div>
          <button type="submit" class="btn btn-primary btn-block">Save Changes</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    // Post detail page specific code
    let currentPost = null;
    let currentPostId = null;

    document.addEventListener('DOMContentLoaded', async () => {
      initNavigation();
      
      // Get post ID from URL
      const urlParams = new URLSearchParams(window.location.search);
      currentPostId = urlParams.get('id');
      
      if (!currentPostId) {
        document.getElementById('postDetail').innerHTML = `
          <div class="error-state">
            <i class="fas fa-exclamation-circle"></i>
            <p>Post not found</p>
            <a href="/" class="btn btn-primary">Go Home</a>
          </div>
        `;
        return;
      }
      
      // Load post
      await loadPost(currentPostId);
      
      // Load comments
      await loadComments(currentPostId);
      
      // Setup comment submission
      document.getElementById('submitComment').addEventListener('click', submitComment);
      
      // Setup sort
      document.getElementById('sortComments').addEventListener('change', () => {
        loadComments(currentPostId);
      });
    });

    async function loadPost(postId) {
      const container = document.getElementById('postDetail');
      
      try {
        const result = await API.posts.getById(postId);
        
        if (!result.success) {
          container.innerHTML = `
            <div class="error-state">
              <i class="fas fa-exclamation-circle"></i>
              <p>Post not found</p>
              <a href="/" class="btn btn-primary">Go Home</a>
            </div>
          `;
          return;
        }
        
        currentPost = result.data.post;
        const post = currentPost;
        const timeAgo = formatTimeAgo(post.createdAt);
        const isLiked = post.isLiked || false;
        const isOwner = post.isOwner || false;
        
        container.innerHTML = `
          <div class="post-detail-header">
            <a href="profile.html?user=${post.author.username}" class="post-author">
              <img src="${post.author.avatar || '../assets/default-avatar.png'}" alt="${post.author.username}" class="author-avatar">
              <div class="author-info">
                <span class="author-name">${post.author.username}</span>
                <span class="post-time">${timeAgo} ${post.isEdited ? '(edited)' : ''}</span>
              </div>
            </a>
            ${isOwner ? `
              <div class="post-menu">
                <button class="menu-btn" id="postMenuBtn"><i class="fas fa-ellipsis-h"></i></button>
                <div class="menu-dropdown" id="postMenuDropdown">
                  <a href="#" id="editPostBtn"><i class="fas fa-edit"></i> Edit</a>
                  <a href="#" id="deletePostBtn"><i class="fas fa-trash"></i> Delete</a>
                </div>
              </div>
            ` : ''}
          </div>
          <div class="post-detail-content">
            <p>${escapeHtml(post.content)}</p>
            ${post.image ? `<img src="${API_BASE_URL}${post.image}" alt="Post image" class="post-detail-image">` : ''}
          </div>
          ${post.tags && post.tags.length > 0 ? `
            <div class="post-detail-tags">
              ${post.tags.map(tag => `<span class="tag">#${escapeHtml(tag)}</span>`).join('')}
            </div>
          ` : ''}
          <div class="post-detail-actions">
            <button class="action-btn like-btn ${isLiked ? 'active' : ''}" id="likePostBtn">
              <i class="${isLiked ? 'fas' : 'far'} fa-heart"></i>
              <span>${post.likesCount || 0}</span>
            </button>
            <button class="action-btn comment-btn">
              <i class="far fa-comment"></i>
              <span>${post.commentsCount || 0}</span>
            </button>
            <button class="action-btn share-btn" id="sharePostBtn">
              <i class="far fa-share-square"></i>
              <span>Share</span>
            </button>
          </div>
        `;
        
        // Show comments section
        document.getElementById('commentsSection').style.display = 'block';
        
        // Update sidebar stats
        document.getElementById('postViews').textContent = post.views || 0;
        document.getElementById('postLikes').textContent = post.likesCount || 0;
        document.getElementById('postComments').textContent = post.commentsCount || 0;
        document.getElementById('postTime').textContent = timeAgo;
        document.getElementById('authorName').textContent = post.author.username;
        
        // Setup action buttons
        document.getElementById('likePostBtn').addEventListener('click', toggleLike);
        
        if (isOwner) {
          document.getElementById('postMenuBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('postMenuDropdown').classList.toggle('show');
          });
          
          document.getElementById('editPostBtn').addEventListener('click', (e) => {
            e.preventDefault();
            openEditModal();
          });
          
          document.getElementById('deletePostBtn').addEventListener('click', (e) => {
            e.preventDefault();
            deletePost();
          });
        }
        
        document.getElementById('sharePostBtn').addEventListener('click', sharePost);
        
        // Load author's other posts
        loadAuthorPosts(post.author._id, postId);
        
      } catch (error) {
        console.error('Load post error:', error);
        container.innerHTML = '<div class="error">Failed to load post</div>';
      }
    }

    async function loadComments(postId) {
      const container = document.getElementById('commentsList');
      const sortBy = document.getElementById('sortComments').value;
      
      try {
        const result = await API.comments.getByPost(postId, { sortBy });
        
        document.getElementById('commentsCount').textContent = `(${result.data.pagination.total})`;
        
        if (result.success && result.data.comments.length > 0) {
          container.innerHTML = result.data.comments.map(comment => createCommentHTML(comment)).join('');
          attachCommentEventListeners(container);
        } else {
          container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-comments"></i>
              <p>No comments yet</p>
              <span>Be the first to share your thoughts!</span>
            </div>
          `;
        }
      } catch (error) {
        console.error('Load comments error:', error);
        container.innerHTML = '<div class="error">Failed to load comments</div>';
      }
    }

    function createCommentHTML(comment, isReply = false) {
      const timeAgo = formatTimeAgo(comment.createdAt);
      const isOwner = Auth.isLoggedIn() && comment.author._id === Auth.getUser().id;
      
      return `
        <div class="comment ${isReply ? 'reply' : ''}" data-id="${comment._id}">
          <img src="${comment.author.avatar || '../assets/default-avatar.png'}" alt="${comment.author.username}" class="comment-avatar">
          <div class="comment-content">
            <div class="comment-header">
              <a href="profile.html?user=${comment.author.username}" class="comment-author">${comment.author.username}</a>
              <span class="comment-time">${timeAgo} ${comment.isEdited ? '(edited)' : ''}</span>
            </div>
            <p class="comment-text">${escapeHtml(comment.content)}</p>
            <div class="comment-actions">
              <button class="action-btn like-comment-btn" data-id="${comment._id}">
                <i class="far fa-heart"></i>
                <span>${comment.likesCount || 0}</span>
              </button>
              <button class="action-btn reply-btn" data-id="${comment._id}">
                <i class="far fa-reply"></i>
                <span>Reply</span>
              </button>
              ${isOwner ? `
                <button class="action-btn edit-comment-btn" data-id="${comment._id}">
                  <i class="far fa-edit"></i>
                </button>
                <button class="action-btn delete-comment-btn" data-id="${comment._id}">
                  <i class="far fa-trash"></i>
                </button>
              ` : ''}
            </div>
            ${comment.replies && comment.replies.length > 0 ? `
              <div class="replies">
                ${comment.replies.map(reply => createCommentHTML(reply, true)).join('')}
              </div>
            ` : ''}
          </div>
        </div>
      `;
    }

    function attachCommentEventListeners(container) {
      // Like comment
      container.querySelectorAll('.like-comment-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!Auth.isLoggedIn()) {
            showToast('Please login to like comments', 'error');
            return;
          }
          
          try {
            const result = await API.comments.like(btn.dataset.id);
            if (result.success) {
              btn.classList.toggle('active', result.data.liked);
              btn.querySelector('i').className = result.data.liked ? 'fas fa-heart' : 'far fa-heart';
              btn.querySelector('span').textContent = result.data.likesCount;
            }
          } catch (error) {
            showToast('Failed to like comment', 'error');
          }
        });
      });
      
      // Reply to comment
      container.querySelectorAll('.reply-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          if (!Auth.isLoggedIn()) {
            showToast('Please login to reply', 'error');
            return;
          }
          
          const commentId = btn.dataset.id;
          const comment = document.querySelector(`.comment[data-id="${commentId}"]`);
          
          // Create reply input
          let replyInput = comment.querySelector('.reply-input');
          if (!replyInput) {
            replyInput = document.createElement('div');
            replyInput.className = 'reply-input';
            replyInput.innerHTML = `
              <textarea placeholder="Write a reply..." rows="2"></textarea>
              <button class="btn btn-primary btn-sm submit-reply">Reply</button>
              <button class="btn btn-text btn-sm cancel-reply">Cancel</button>
            `;
            comment.querySelector('.comment-content').appendChild(replyInput);
            
            replyInput.querySelector('.cancel-reply').addEventListener('click', () => {
              replyInput.remove();
            });
            
            replyInput.querySelector('.submit-reply').addEventListener('click', async () => {
              const content = replyInput.querySelector('textarea').value.trim();
              if (!content) return;
              
              try {
                await API.comments.create({
                  postId: currentPostId,
                  content,
                  parentCommentId: commentId
                });
                showToast('Reply posted', 'success');
                loadComments(currentPostId);
              } catch (error) {
                showToast('Failed to post reply', 'error');
              }
            });
          }
        });
      });
      
      // Edit comment
      container.querySelectorAll('.edit-comment-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const commentId = btn.dataset.id;
          const comment = document.querySelector(`.comment[data-id="${commentId}"]`);
          const textEl = comment.querySelector('.comment-text');
          const currentText = textEl.textContent;
          
          textEl.innerHTML = `
            <textarea rows="3">${currentText}</textarea>
            <button class="btn btn-primary btn-sm save-edit">Save</button>
            <button class="btn btn-text btn-sm cancel-edit">Cancel</button>
          `;
          
          textEl.querySelector('.cancel-edit').addEventListener('click', () => {
            textEl.textContent = currentText;
          });
          
          textEl.querySelector('.save-edit').addEventListener('click', async () => {
            const newContent = textEl.querySelector('textarea').value.trim();
            if (!newContent) return;
            
            try {
              await API.comments.update(commentId, { content: newContent });
              showToast('Comment updated', 'success');
              loadComments(currentPostId);
            } catch (error) {
              showToast('Failed to update comment', 'error');
            }
          });
        });
      });
      
      // Delete comment
      container.querySelectorAll('.delete-comment-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Are you sure you want to delete this comment?')) return;
          
          try {
            await API.comments.delete(btn.dataset.id);
            showToast('Comment deleted', 'success');
            loadComments(currentPostId);
          } catch (error) {
            showToast('Failed to delete comment', 'error');
          }
        });
      });
    }

    async function submitComment() {
      if (!Auth.isLoggedIn()) {
        showToast('Please login to comment', 'error');
        return;
      }
      
      const content = document.getElementById('commentContent').value.trim();
      if (!content) {
        showToast('Please write something', 'error');
        return;
      }
      
      try {
        await API.comments.create({ postId: currentPostId, content });
        document.getElementById('commentContent').value = '';
        showToast('Comment posted', 'success');
        loadComments(currentPostId);
      } catch (error) {
        showToast('Failed to post comment', 'error');
      }
    }

    async function toggleLike() {
      if (!Auth.isLoggedIn()) {
        showToast('Please login to like posts', 'error');
        return;
      }
      
      try {
        const result = await API.posts.like(currentPostId);
        if (result.success) {
          const btn = document.getElementById('likePostBtn');
          btn.classList.toggle('active', result.data.liked);
          btn.querySelector('i').className = result.data.liked ? 'fas fa-heart' : 'far fa-heart';
          btn.querySelector('span').textContent = result.data.likesCount;
          document.getElementById('postLikes').textContent = result.data.likesCount;
        }
      } catch (error) {
        showToast('Failed to like post', 'error');
      }
    }

    function openEditModal() {
      document.getElementById('editPostContent').value = currentPost.content;
      document.getElementById('currentPostImage').innerHTML = currentPost.image 
        ? `<img src="${API_BASE_URL}${currentPost.image}" alt="Current">` 
        : '<p>No image</p>';
      document.getElementById('editPostModal').style.display = 'flex';
    }

    document.getElementById('closeEditModal').addEventListener('click', () => {
      document.getElementById('editPostModal').style.display = 'none';
    });

    document.getElementById('editPostForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const content = document.getElementById('editPostContent').value;
      const removeImage = document.getElementById('removePostImage').checked;
      const imageFile = document.getElementById('editPostImage').files[0];
      
      try {
        await API.posts.update(currentPostId, { content, removeImage, image: imageFile });
        showToast('Post updated', 'success');
        document.getElementById('editPostModal').style.display = 'none';
        loadPost(currentPostId);
      } catch (error) {
        showToast('Failed to update post', 'error');
      }
    });

    async function deletePost() {
      if (!confirm('Are you sure you want to delete this post?')) return;
      
      try {
        await API.posts.delete(currentPostId);
        showToast('Post deleted', 'success');
        setTimeout(() => window.location.href = '/', 1000);
      } catch (error) {
        showToast('Failed to delete post', 'error');
      }
    }

    function sharePost() {
      const url = window.location.href;
      navigator.clipboard.writeText(url).then(() => {
        showToast('Link copied to clipboard', 'success');
      });
    }

    async function loadAuthorPosts(authorId, excludePostId) {
      try {
        const result = await API.users.getPosts(authorId, { limit: 5 });
        const container = document.getElementById('authorPosts');
        
        if (result.success && result.data.posts.length > 0) {
          const posts = result.data.posts.filter(p => p._id !== excludePostId).slice(0, 3);
          
          if (posts.length > 0) {
            container.innerHTML = posts.map(post => `
              <a href="post.html?id=${post._id}" class="mini-post">
                <p>${escapeHtml(post.content.substring(0, 100))}${post.content.length > 100 ? '...' : ''}</p>
                <span>${formatTimeAgo(post.createdAt)}</span>
              </a>
            `).join('');
          } else {
            container.innerHTML = '<p class="empty">No other posts</p>';
          }
        } else {
          container.innerHTML = '<p class="empty">No other posts</p>';
        }
      } catch (error) {
        console.error('Load author posts error:', error);
      }
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', () => {
      const dropdown = document.getElementById('postMenuDropdown');
      if (dropdown) dropdown.classList.remove('show');
    });
  </script>
</body>
</html>
